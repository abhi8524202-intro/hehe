<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ffd6e8,#ffeef7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
animation:fade .8s;
}

.page.active{
display:flex;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.95);
}
to{
opacity:1;
transform:scale(1);
}
}

.card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
max-width:350px;
width:95%;
}

img{
width:240px;
height:240px;
object-fit:cover;
border-radius:20px;
margin-bottom:20px;
}

h1{
font-size:28px;
color:#ff2f75;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:20px;
color:#555;
}

button{
padding:14px 28px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
transition:.3s;
margin:8px;
}

.yes{
background:#ff4081;
color:white;
}

.yes:hover{
transform:scale(1.08);
}

.no{
background:#ddd;
position:relative;
}

.hearts{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
top:0;
left:0;
}

.heart{
position:absolute;
color:#ff4f8f;
animation:float 8s linear infinite;
font-size:24px;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-120px) scale(1.4);
opacity:0;
}
}

.final{
font-size:34px;
color:#ff2f75;
font-weight:bold;
margin-top:15px;
animation:pop 1s infinite;
}

@keyframes pop{
50%{
transform:scale(1.1);
}
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="page active" id="p1">

<div class="card">

<img src="https://placecats.com/millie/400/400">

<h1>Hey You ❤️</h1>

<p>I have something special to ask you...</p>

<button class="yes" onclick="nextPage()">Continue 💕</button>

</div>

</div>

<div class="page" id="p2">

<div class="card">

<img src="https://placecats.com/louie/400/400">

<h1>You Look Cute 🥹❤️</h1>

<p>Can I ask you one question?</p>

<button class="yes" onclick="nextPage()">Sure 💖</button>

</div>

</div>


<div class="page" id="p3">

<div class="card">

<img src="https://placecats.com/bella/400/400">

<h1>Do You Like Me? 🥺</h1>

<p>Please answer honestly 💕</p>

<button class="yes" onclick="nextPage()">Yes ❤️</button>

<button class="no" id="no1">No 😝</button>

</div>

</div>


<div class="page" id="p4">

<div class="card">

<img src="https://placecats.com/neo/400/400">

<h1>Really...? 😳</h1>

<p>Think once again 🥹</p>

<button class="yes" onclick="nextPage()">Yes 😍</button>

<button class="no" id="no2">Still No 😂</button>

</div>

</div>


<div class="page" id="p5">

<div class="card">

<img src="https://placecats.com/ginger/400/400">

<h1>Last Chance ❤️</h1>

<p>You know you want to click YES 😆</p>

<button class="yes" onclick="nextPage()">YES 💖</button>

<button class="no" id="no3">No 🙈</button>

</div>

</div>


<div class="page" id="p6">

<div class="card">

<img src="https://placecats.com/cat/400/400">

<h1>Yayyyyy!!! 🎉</h1>

<div class="final">

❤️ I Knew It ❤️

</div>

<p style="margin-top:20px;">
Thank You So Much 🥹💕
</p>

</div>

</div>

<script>

let current = 1;

function nextPage() {

document.getElementById("p"+current).classList.remove("active");

current++;

if(current<=6){

document.getElementById("p"+current).classList.add("active");

}

}

function move(btn){

btn.style.position="absolute";

btn.style.left=Math.random()*80+"vw";

btn.style.top=Math.random()*80+"vh";

}

["no1","no2","no3"].forEach(id=>{

const b=document.getElementById(id);

b.addEventListener("mouseover",()=>move(b));

b.addEventListener("click",()=>move(b));

});


function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>heart.remove(),8000);

}

setInterval(createHeart,250);

</script>

</body>

</html>
